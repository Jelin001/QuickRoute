# CyberCare Configuration File
# Update these values according to your environment

[cybercare.database]
host = "localhost"
username = "root"
password = "your_password_here"
database = "cybercare_db"
port = 3306

[cybercare.jwt]
secret = "cybercare_jwt_secret_key_change_in_production_2024"
issuer = "cybercare-system"
audience = "cybercare-users"
expiration_time = 86400  # 24 hours in seconds

[cybercare.password]
secret = "cybercare_password_salt_secret_2024"

[cybercare.email]
smtp_server = "smtp.gmail.com"
smtp_port = 587
username = "your_email@gmail.com"
password = "your_app_password"
from_address = "noreply@cybercare.com"

[cybercare.external_apis]
hibp_api_key = "your_hibp_api_key_here"
hibp_base_url = "https://haveibeenpwned.com/api/v3"
virustotal_api_key = "your_virustotal_api_key_here"
virustotal_base_url = "https://www.virustotal.com/api/v3"

[cybercare.server]
host = "localhost"
port = 8080
cors_allowed_origins = ["http://localhost:3000", "http://localhost:5173"]

[cybercare.cert]
email = "cert@government.agency"
export_endpoint = "https://cert.gov/api/threats"
notification_enabled = true